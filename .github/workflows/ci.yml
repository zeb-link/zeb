name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "these files need gofmt:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - run: go vet ./...
      - run: go test ./...

  # Proves a release would build before a tag is pushed, so a broken
  # cross-compile fails on the PR instead of halfway through publishing.
  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: make npm-build

      - name: Dry-run the npm publish
        run: scripts/publish-npm.sh
