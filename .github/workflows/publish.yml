# Publishes zeb to npm when a v* tag is pushed.
#
# Auth is npm trusted publishing (OIDC) — no token, nothing to expire. That
# requires `id-token: write` below, and each package must have this repo +
# workflow filename registered as its trusted publisher on npmjs.com. Renaming
# this file breaks publishing until the trusted publisher config is updated to
# match. See RELEASE.md.
#
# Because the build runs here from public source, npm attaches a provenance
# attestation to every package automatically.
name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for trusted publishing (OIDC)
      contents: write # required to create the GitHub release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false # never cache in release builds

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      # Trusted publishing needs npm >= 11.5.1; the bundled npm may be older.
      - name: Use a trusted-publishing-capable npm
        run: npm install -g npm@latest

      - name: Verify the tag matches npm/package.json
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./npm/package.json').version")"
          if [[ "$tag" != "$pkg" ]]; then
            echo "tag v$tag does not match npm/package.json version $pkg" >&2
            exit 1
          fi
          echo "releasing v$pkg"

      - run: make test

      - name: Build binaries and assemble npm packages
        run: make npm-build

      - name: Publish to npm
        run: PUBLISH=1 scripts/publish-npm.sh

      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file CHANGELOG.md
